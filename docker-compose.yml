# Full stack: app (FastAPI) + dots-ocr (parser, GPU) + Postgres + Qdrant + Neo4j.
#   docker compose up -d --build
#   one-off ingest: docker compose run --rm app python3 main.py ingest documents/<file>.pdf
services:
  app:
    image: raganything-app:latest        # reuse the loaded/saved image offline; build still runs normally if absent or --build
    build:
      context: .
      args:
        REGISTRY: ${REGISTRY:-docker.io}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    env_file: .env
    environment:                       # override .env hosts with compose service names
      POSTGRES_HOST: postgres
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      DOTS_OCR_URL: http://dots-ocr:8000/v1
    ports:
      - "8001:8000"                    # host 8001 -> container 8000 (8000 was taken)
    volumes:
      - ./documents:/app/documents
      - ./data/output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      dots-ocr:
        condition: service_healthy
    restart: unless-stopped

  dots-ocr:                            # document parser: dots.ocr served by vLLM (OpenAI-compatible)
    image: ${REGISTRY:-docker.io}/rednotehilab/dots.ocr:vllm-openai-v0.9.1
    command: >
      --model /weights
      --served-model-name model
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.9
      --chat-template-content-format string
      --trust-remote-code
    environment:
      VLLM_USE_MODELSCOPE: "True"      # if pulling by repo id; ignored when serving the local /weights path
      HF_HUB_OFFLINE: "1"              # never reach HuggingFace
    volumes:
      - ./data/dots-weights:/weights   # pre-downloaded from ModelScope (see README)
      - ./data/dots-cache:/root/.cache
    devices:                           # GPU via CDI (rootless); needs cdi enabled in ~/.config/docker/daemon.json
      - "nvidia.com/gpu=all"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 300s              # vLLM model load is slow
    restart: unless-stopped

  postgres:
    image: ${REGISTRY:-docker.io}/library/postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DATABASE:-ragdb}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DATABASE:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: ${REGISTRY:-docker.io}/qdrant/qdrant:v1.18.1
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: ${REGISTRY:-docker.io}/library/neo4j:5.26
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-ragpassword}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-ragpassword} 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
