# Full stack: app (FastAPI, GPU) + Postgres + Qdrant + Neo4j.
#   docker compose up -d --build
#   one-off ingest: docker compose run --rm app python3 main.py ingest documents/<file>.pdf
services:
  app:
    build:
      context: .
      args:
        REGISTRY: ${REGISTRY:-docker.io}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    env_file: .env
    environment:                       # override .env DB hosts with compose service names
      POSTGRES_HOST: postgres
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      MINERU_MODEL_SOURCE: modelscope  # MinerU models from ModelScope (China), not HuggingFace
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/app/documents
      - parseout:/app/output
      - modelcache:/root/.cache        # MinerU/HuggingFace models persist (downloaded once)
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  postgres:
    image: ${REGISTRY:-docker.io}/library/postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DATABASE:-ragdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DATABASE:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: ${REGISTRY:-docker.io}/qdrant/qdrant:v1.18.1
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: ${REGISTRY:-docker.io}/library/neo4j:5.26
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-ragpassword}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-ragpassword} 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
  parseout:
  modelcache:
